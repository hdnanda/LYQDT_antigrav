<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LYQDT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                background: '#0A0B09', // Deep Charcoal
                surface: '#1A1D16', // Dark Olive Card Backgrounds
                primary: '#6A7B3E', // Moss Green Accents/Buttons
                hover: '#889C53', // Lighter Green for hovers
                text: '#FFFFFF', // Crisp White text
                muted: '#A3A898', // Gray-Green secondary text
                border: '#2A2E24', // Dark divider lines
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0a0b09; /* Fallback to brand background */
        color: #ffffff;
      }
      /* Custom Scrollbar styled to the new brand */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0b09;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2e24;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6a7b3e;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@^19.2.4/",
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
          "framer-motion": "https://esm.sh/framer-motion@^12.33.0",
          "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
          "react-dom": "https://esm.sh/react-dom@^19.2.4",
          "firebase/app": "https://esm.sh/firebase@10.8.0/app",
          "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
          "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore",
          "firebase/": "https://esm.sh/firebase@^12.9.0/"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />

  <body class="bg-brand-background text-brand-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
